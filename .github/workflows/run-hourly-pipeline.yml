name: run-hourly-pipeline

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-hourly-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          API_BASE_URL: ${{ secrets.FORECASTHUB_API_BASE_URL }}
          SCHEDULER_JOB_TOKEN: ${{ secrets.SCHEDULER_JOB_TOKEN }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "Missing FORECASTHUB_API_BASE_URL secret"
            exit 1
          fi
          if [ -z "$SCHEDULER_JOB_TOKEN" ]; then
            echo "Missing SCHEDULER_JOB_TOKEN secret"
            exit 1
          fi

      - name: Trigger hourly pipeline
        env:
          API_BASE_URL: ${{ secrets.FORECASTHUB_API_BASE_URL }}
          SCHEDULER_JOB_TOKEN: ${{ secrets.SCHEDULER_JOB_TOKEN }}
        run: |
          curl --fail --show-error --silent \
            -X POST "${API_BASE_URL}/api/v1/jobs/hourly-pipeline" \
            -H "Authorization: Bearer ${SCHEDULER_JOB_TOKEN}" \
            -H "Content-Type: application/json"
